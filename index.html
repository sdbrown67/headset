<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Quest 3 Passthrough GLB Viewer</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
      // Place model where controller points (simple MR placement)
      AFRAME.registerComponent("place-on-trigger", {
        init: function () {
          this.raycaster = new THREE.Raycaster();
          this.tempMatrix = new THREE.Matrix4();

          this.el.addEventListener("triggerdown", (e) => {
            const controller = e.target;

            this.tempMatrix.identity().extractRotation(controller.object3D.matrixWorld);

            const origin = new THREE.Vector3();
            origin.setFromMatrixPosition(controller.object3D.matrixWorld);

            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyMatrix4(this.tempMatrix);

            this.raycaster.set(origin, direction);

            // pretend floor plane at y = 0 (simple MR ground)
            const t = -origin.y / direction.y;
            const hitPoint = origin.clone().add(direction.multiplyScalar(t));

            const model = document.querySelector("#model");
            model.setAttribute("position", {
              x: hitPoint.x,
              y: 0,
              z: hitPoint.z,
            });
          });
        },
      });
    </script>
  </head>

  <body>
    <a-scene
      webxr="requiredFeatures: local-floor;
             optionalFeatures: hit-test, dom-overlay"
      renderer="alpha: true; colorManagement: true"
      background="transparent: true"
      vr-mode-ui="enabled: true"
    >

      <!-- LIGHTING -->
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="2 4 2"></a-light>

      <!-- CAMERA / RIG -->
      <a-entity id="rig">
        <a-camera position="0 1.6 0"></a-camera>

        <!-- CONTROLLERS -->
        <a-entity laser-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right"
                  place-on-trigger></a-entity>
      </a-entity>

      <!-- GLB MODEL -->
      <a-entity
        id="model"
        gltf-model="url(model.glb)"
        scale="1 1 1"
        position="0 0 -1"
      ></a-entity>

    </a-scene>
  </body>
</html>
